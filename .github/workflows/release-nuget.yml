name: Release
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

jobs:
  publish:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, rid: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
      - name: Run Pipeline
        run: dotnet run --project .build/Build.csproj -- --target release --rid ${{ matrix.rid }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
