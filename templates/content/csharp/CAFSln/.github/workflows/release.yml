name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*" # Matches 1.0.0, 1.0.0-preview, etc.

jobs:
  publish:
    name: Release for ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: macos-latest, rid: osx-arm64 }
          - { os: ubuntu-latest, rid: linux-x64 }

    permissions:
      contents: write # Required for 'gh release upload'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Ensure GitHub Release Exists
        # One-liner to create the release if it's missing so the pipeline can upload to it
        shell: bash
        run: gh release view ${{ github.ref_name }} || gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "Automated Release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Release Pipeline
        # This one command handles: Build, Test, Publish, Velopack, NuGet Pack, and Uploading
        run: dotnet run --project .build/Build.csproj -- --target release --rid ${{ matrix.rid }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
